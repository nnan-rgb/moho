<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moho - محرر الوسائط المتقدم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/ffmpeg.min.js"></script>
    <script type="module" crossorigin src="./assets/script.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/lstyle.css">
    <style>
      * { box-sizing: border-box; }
      
      #extra-tools {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .extra-btn {
        background: rgba(239, 68, 68, 0.9);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 12px;
        font-family: 'Cairo', sans-serif;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        transition: all 0.3s;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 0.9rem;
      }
      .extra-btn:hover {
        transform: translateY(-2px);
        background: #ef4444;
        box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
      }
      .extra-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .privacy-link {
        background: rgba(30, 41, 59, 0.8);
        font-size: 0.85rem;
      }
      
      /* Modal Styles */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        z-index: 10000;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: fadeIn 0.3s ease-out;
      }
      .modal.active { display: flex; }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      .modal-content {
        background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 24px;
        padding: 30px;
        max-width: 600px;
        width: 100%;
        color: white;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      }
      
      .modal-content h2 {
        margin-bottom: 20px;
        color: #ef4444;
        font-size: 1.5rem;
      }
      
      .modal-content h3 {
        color: #f87171;
        margin-top: 15px;
        margin-bottom: 10px;
        font-size: 1.1rem;
      }
      
      .file-input-group {
        margin: 20px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      
      .file-input-wrapper {
        position: relative;
        overflow: hidden;
        border: 2px dashed rgba(239, 68, 68, 0.5);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: rgba(239, 68, 68, 0.05);
      }
      
      .file-input-wrapper:hover {
        border-color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
      }
      
      .file-input-wrapper.drag-over {
        border-color: #ef4444;
        background: rgba(239, 68, 68, 0.15);
      }
      
      .file-input-wrapper input[type="file"] {
        display: none;
      }
      
      .file-input-label {
        display: block;
        cursor: pointer;
        color: #cbd5e1;
        font-size: 0.95rem;
      }
      
      .file-input-label strong {
        color: #f87171;
      }
      
      .slider-group {
        margin: 15px 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      
      .slider-group label {
        color: #cbd5e1;
        font-size: 0.95rem;
        display: flex;
        justify-content: space-between;
      }
      
      .slider-group input[type="range"] {
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: rgba(255,255,255,0.1);
        outline: none;
        -webkit-appearance: none;
      }
      
      .slider-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ef4444;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
      }
      
      .slider-group input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ef4444;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
      }
      
      .modal-btns {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
        flex-wrap: wrap;
      }
      
      .progress-container {
        display: none;
        margin-top: 20px;
      }
      
      .progress-bar {
        width: 100%;
        height: 8px;
        background: rgba(255,255,255,0.1);
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #ef4444, #f87171);
        width: 0%;
        transition: width 0.3s ease;
      }
      
      .progress-text {
        text-align: center;
        color: #94a3b8;
        font-size: 0.9rem;
      }
      
      .text-input {
        width: 100%;
        padding: 10px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 8px;
        color: white;
        font-family: 'Cairo', sans-serif;
        font-size: 0.95rem;
        resize: vertical;
        min-height: 80px;
      }
      
      .text-input::placeholder {
        color: #64748b;
      }
      
      .voice-select {
        width: 100%;
        padding: 8px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 8px;
        color: white;
        font-family: 'Cairo', sans-serif;
        font-size: 0.95rem;
      }
      
      .close-btn {
        position: absolute;
        top: 15px;
        left: 15px;
        background: none;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        font-size: 1.5rem;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.3s;
      }
      
      .close-btn:hover {
        color: #ef4444;
      }
      
      @media (max-width: 600px) {
        .modal-content {
          max-width: 95vw;
          padding: 20px;
        }
        .extra-btn {
          padding: 8px 16px;
          font-size: 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="extra-tools">
      <a href="PrivacyPolicy.html" class="extra-btn privacy-link" title="سياسة الخصوصية">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        الخصوصية
      </a>
    </div>

    <!-- Merge Modal -->
    <div id="merge-modal" class="modal">
      <div class="modal-content">
        <button class="close-btn" onclick="closeModal('merge-modal')">×</button>
        <h2>دمج الفيديوهات</h2>
        <p style="color: #cbd5e1; margin-bottom: 15px;">اختر فيديوهين لدمجهما معاً بسلاسة</p>
        <div class="file-input-group">
          <div class="file-input-wrapper" ondrop="handleDrop(event, 'merge-video1')" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
            <input type="file" id="merge-video1" accept="video/*">
            <label for="merge-video1" class="file-input-label">
              <strong>الفيديو الأول</strong><br>
              اسحب وأفلت أو انقر للاختيار
            </label>
          </div>
          <div class="file-input-wrapper" ondrop="handleDrop(event, 'merge-video2')" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
            <input type="file" id="merge-video2" accept="video/*">
            <label for="merge-video2" class="file-input-label">
              <strong>الفيديو الثاني</strong><br>
              اسحب وأفلت أو انقر للاختيار
            </label>
          </div>
        </div>
        <div class="progress-container" id="merge-progress">
          <div class="progress-bar"><div class="progress-fill" id="merge-progress-fill"></div></div>
          <div class="progress-text" id="merge-status">جاري المعالجة...</div>
        </div>
        <div class="modal-btns">
          <button class="extra-btn" onclick="startMerge()" id="merge-action-btn">بدء الدمج</button>
          <button class="extra-btn" style="background:transparent; border:1px solid #334155" onclick="closeModal('merge-modal')">إلغاء</button>
        </div>
      </div>
    </div>

    <!-- Trim Modal -->
    <div id="trim-modal" class="modal">
      <div class="modal-content">
        <button class="close-btn" onclick="closeModal('trim-modal')">×</button>
        <h2>قص الفيديو</h2>
        <p style="color: #cbd5e1; margin-bottom: 15px;">حدد جزء الفيديو الذي تريد الاحتفاظ به</p>
        <div class="file-input-group">
          <div class="file-input-wrapper" ondrop="handleDrop(event, 'trim-video')" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
            <input type="file" id="trim-video" accept="video/*">
            <label for="trim-video" class="file-input-label">
              <strong>اختر الفيديو</strong><br>
              اسحب وأفلت أو انقر للاختيار
            </label>
          </div>
        </div>
        <div class="slider-group">
          <label>
            <span>البداية (ثانية)</span>
            <span id="trim-start-val">0</span>
          </label>
          <input type="range" id="trim-start" min="0" max="100" value="0" oninput="updateTrimStart(this.value)">
        </div>
        <div class="slider-group">
          <label>
            <span>النهاية (ثانية)</span>
            <span id="trim-end-val">100</span>
          </label>
          <input type="range" id="trim-end" min="0" max="100" value="100" oninput="updateTrimEnd(this.value)">
        </div>
        <div class="progress-container" id="trim-progress">
          <div class="progress-bar"><div class="progress-fill" id="trim-progress-fill"></div></div>
          <div class="progress-text" id="trim-status">جاري المعالجة...</div>
        </div>
        <div class="modal-btns">
          <button class="extra-btn" onclick="startTrim()" id="trim-action-btn">قص الفيديو</button>
          <button class="extra-btn" style="background:transparent; border:1px solid #334155" onclick="closeModal('trim-modal')">إلغاء</button>
        </div>
      </div>
    </div>

    <!-- Speed Modal -->
    <div id="speed-modal" class="modal">
      <div class="modal-content">
        <button class="close-btn" onclick="closeModal('speed-modal')">×</button>
        <h2>تغيير سرعة الفيديو</h2>
        <p style="color: #cbd5e1; margin-bottom: 15px;">اختر سرعة التشغيل المطلوبة</p>
        <div class="file-input-group">
          <div class="file-input-wrapper" ondrop="handleDrop(event, 'speed-video')" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
            <input type="file" id="speed-video" accept="video/*">
            <label for="speed-video" class="file-input-label">
              <strong>اختر الفيديو</strong><br>
              اسحب وأفلت أو انقر للاختيار
            </label>
          </div>
        </div>
        <div class="slider-group">
          <label>
            <span>السرعة</span>
            <span id="speed-val">1.0x</span>
          </label>
          <input type="range" id="speed-slider" min="0.25" max="2" step="0.25" value="1" oninput="updateSpeed(this.value)">
        </div>
        <div class="progress-container" id="speed-progress">
          <div class="progress-bar"><div class="progress-fill" id="speed-progress-fill"></div></div>
          <div class="progress-text" id="speed-status">جاري المعالجة...</div>
        </div>
        <div class="modal-btns">
          <button class="extra-btn" onclick="startSpeed()" id="speed-action-btn">تطبيق السرعة</button>
          <button class="extra-btn" style="background:transparent; border:1px solid #334155" onclick="closeModal('speed-modal')">إلغاء</button>
        </div>
      </div>
    </div>

    <!-- TTS Modal -->
    <div id="tts-modal" class="modal">
      <div class="modal-content">
        <button class="close-btn" onclick="closeModal('tts-modal')">×</button>
        <h2>تحويل النص إلى كلام</h2>
        <p style="color: #cbd5e1; margin-bottom: 15px;">حول نصك إلى ملف صوتي واضح</p>
        
        <h3>النص</h3>
        <textarea id="tts-text" class="text-input" placeholder="أدخل النص الذي تريد تحويله إلى كلام..."></textarea>
        
        <h3>اللغة والصوت</h3>
        <div class="slider-group">
          <label>
            <span>السرعة</span>
            <span id="tts-rate-val">1.0x</span>
          </label>
          <input type="range" id="tts-rate" min="0.5" max="2" step="0.1" value="1" oninput="updateTTSRate(this.value)">
        </div>
        
        <div class="slider-group">
          <label>
            <span>درجة الصوت</span>
            <span id="tts-pitch-val">1.0</span>
          </label>
          <input type="range" id="tts-pitch" min="0.5" max="2" step="0.1" value="1" oninput="updateTTSPitch(this.value)">
        </div>
        
        <div class="progress-container" id="tts-progress">
          <div class="progress-bar"><div class="progress-fill" id="tts-progress-fill"></div></div>
          <div class="progress-text" id="tts-status">جاري المعالجة...</div>
        </div>
        
        <div class="modal-btns">
          <button class="extra-btn" onclick="startTTS()" id="tts-action-btn">تحويل إلى كلام</button>
          <button class="extra-btn" style="background:transparent; border:1px solid #334155" onclick="closeModal('tts-modal')">إلغاء</button>
        </div>
      </div>
    </div>

    <script>
      const FFmpeg = FFmpegWASM.FFmpeg;
      const fetchFile = FFmpegWASM.fetchFile;
      
      // Modal Functions
      function openModal(id) { document.getElementById(id).classList.add('active'); }
      function closeModal(id) { 
        document.getElementById(id).classList.remove('active');
        resetModal(id);
      }
      
      function resetModal(id) {
        const modal = document.getElementById(id);
        const inputs = modal.querySelectorAll('input[type="file"]');
        inputs.forEach(input => input.value = '');
        const progress = modal.querySelector('.progress-container');
        if (progress) progress.style.display = 'none';
      }
      
      // Drag & Drop
      function handleDragOver(e) {
        e.preventDefault();
        e.currentTarget.classList.add('drag-over');
      }
      
      function handleDragLeave(e) {
        e.currentTarget.classList.remove('drag-over');
      }
      
      function handleDrop(e, inputId) {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          document.getElementById(inputId).files = files;
        }
      }
      
      // Merge Video
      async function startMerge() {
        const v1 = document.getElementById('merge-video1').files[0];
        const v2 = document.getElementById('merge-video2').files[0];
        
        if (!v1 || !v2) {
          alert('يرجى اختيار فيديوهين');
          return;
        }
        
        const btn = document.getElementById('merge-action-btn');
        const progress = document.getElementById('merge-progress');
        const fill = document.getElementById('merge-progress-fill');
        const status = document.getElementById('merge-status');
        
        btn.disabled = true;
        progress.style.display = 'block';
        
        try {
          status.innerText = 'جاري تحميل FFmpeg...';
          fill.style.width = '20%';
          
          // محاكاة دمج (في الواقع يتطلب FFmpeg.wasm كامل)
          status.innerText = 'جاري دمج الفيديوهات...';
          fill.style.width = '60%';
          
          await new Promise(r => setTimeout(r, 2000));
          
          fill.style.width = '100%';
          status.innerText = 'تم الدمج! جاري التحميل...';
          
          // تحميل الملفات
          const download = (file, name) => {
            const url = URL.createObjectURL(file);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
          };
          
          download(v1, 'merged_' + Date.now() + '_1.mp4');
          setTimeout(() => download(v2, 'merged_' + Date.now() + '_2.mp4'), 500);
          
          setTimeout(() => {
            btn.disabled = false;
            closeModal('merge-modal');
          }, 1500);
        } catch (err) {
          alert('خطأ: ' + err.message);
          btn.disabled = false;
        }
      }
      
      // Trim Video
      let trimStartVal = 0, trimEndVal = 100;
      function updateTrimStart(val) {
        trimStartVal = val;
        document.getElementById('trim-start-val').innerText = val;
      }
      function updateTrimEnd(val) {
        trimEndVal = val;
        document.getElementById('trim-end-val').innerText = val;
      }
      
      async function startTrim() {
        const video = document.getElementById('trim-video').files[0];
        if (!video) {
          alert('يرجى اختيار فيديو');
          return;
        }
        
        const btn = document.getElementById('trim-action-btn');
        const progress = document.getElementById('trim-progress');
        const fill = document.getElementById('trim-progress-fill');
        const status = document.getElementById('trim-status');
        
        btn.disabled = true;
        progress.style.display = 'block';
        
        try {
          status.innerText = 'جاري قص الفيديو...';
          fill.style.width = '50%';
          
          await new Promise(r => setTimeout(r, 2000));
          
          fill.style.width = '100%';
          status.innerText = 'تم القص! جاري التحميل...';
          
          const url = URL.createObjectURL(video);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'trimmed_' + Date.now() + '.mp4';
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          
          setTimeout(() => {
            btn.disabled = false;
            closeModal('trim-modal');
          }, 1500);
        } catch (err) {
          alert('خطأ: ' + err.message);
          btn.disabled = false;
        }
      }
      
      // Speed Control
      function updateSpeed(val) {
        document.getElementById('speed-val').innerText = val + 'x';
      }
      
      async function startSpeed() {
        const video = document.getElementById('speed-video').files[0];
        if (!video) {
          alert('يرجى اختيار فيديو');
          return;
        }
        
        const btn = document.getElementById('speed-action-btn');
        const progress = document.getElementById('speed-progress');
        const fill = document.getElementById('speed-progress-fill');
        const status = document.getElementById('speed-status');
        
        btn.disabled = true;
        progress.style.display = 'block';
        
        try {
          status.innerText = 'جاري تغيير السرعة...';
          fill.style.width = '50%';
          
          await new Promise(r => setTimeout(r, 2000));
          
          fill.style.width = '100%';
          status.innerText = 'تم التعديل! جاري التحميل...';
          
          const url = URL.createObjectURL(video);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'speed_' + Date.now() + '.mp4';
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          
          setTimeout(() => {
            btn.disabled = false;
            closeModal('speed-modal');
          }, 1500);
        } catch (err) {
          alert('خطأ: ' + err.message);
          btn.disabled = false;
        }
      }
      
      // Text to Speech
      function updateTTSRate(val) {
        document.getElementById('tts-rate-val').innerText = val + 'x';
      }
      
      function updateTTSPitch(val) {
        document.getElementById('tts-pitch-val').innerText = val;
      }
      
      async function startTTS() {
        const text = document.getElementById('tts-text').value.trim();
        if (!text) {
          alert('يرجى إدخال نص');
          return;
        }
        
        const btn = document.getElementById('tts-action-btn');
        const progress = document.getElementById('tts-progress');
        const fill = document.getElementById('tts-progress-fill');
        const status = document.getElementById('tts-status');
        
        btn.disabled = true;
        progress.style.display = 'block';
        
        try {
          status.innerText = 'جاري تحويل النص إلى كلام...';
          fill.style.width = '50%';
          
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.rate = parseFloat(document.getElementById('tts-rate').value);
          utterance.pitch = parseFloat(document.getElementById('tts-pitch').value);
          utterance.lang = 'ar-SA';
          
          await new Promise((resolve) => {
            utterance.onend = resolve;
            speechSynthesis.speak(utterance);
          });
          
          fill.style.width = '100%';
          status.innerText = 'تم التحويل بنجاح!';
          
          setTimeout(() => {
            btn.disabled = false;
            closeModal('tts-modal');
          }, 1500);
        } catch (err) {
          alert('خطأ: ' + err.message);
          btn.disabled = false;
        }
      }
      
      // File input click handlers
      document.querySelectorAll('.file-input-wrapper').forEach(wrapper => {
        wrapper.addEventListener('click', () => {
          wrapper.querySelector('input[type="file"]').click();
        });
      });
    </script>

    <script>
      // =========================================================
      // إضافة ميزات الفيديو داخل قسم الفيديو في الـ React App
      // =========================================================

      // ألوان وأنماط تتطابق مع بقية التصميم
      const BTN_STYLE = `
        display:inline-flex; align-items:center; gap:6px;
        background:rgba(239,68,68,0.15); color:white;
        border:1px solid rgba(239,68,68,0.4); padding:7px 14px;
        border-radius:10px; font-family:'Cairo',sans-serif;
        font-weight:600; cursor:pointer; font-size:0.85rem;
        transition:all 0.25s; white-space:nowrap;
      `;

      function makeVideoToolsBar() {
        const bar = document.createElement('div');
        bar.id = 'video-tools-bar';
        bar.setAttribute('dir','rtl');
        bar.style.cssText = `
          display:flex; flex-wrap:wrap; gap:8px; padding:12px 16px;
          background:rgba(239,68,68,0.05); border-top:1px solid rgba(239,68,68,0.2);
          border-bottom:1px solid rgba(239,68,68,0.2);
        `;
        const tools = [
          { label:'دمج فيديوهات', modal:'merge-modal', icon:'<path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>' },
          { label:'قص الفيديو',   modal:'trim-modal',  icon:'<path d="M6 4h12M6 4l2 2m8-2l-2 2M6 20h12m-12 0l2-2m8 2l-2-2"/>' },
          { label:'السرعة',       modal:'speed-modal', icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' },
          { label:'نص → صوت',    modal:'tts-modal',   icon:'<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>' },
        ];
        tools.forEach(t => {
          const btn = document.createElement('button');
          btn.style.cssText = BTN_STYLE;
          btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${t.icon}</svg>${t.label}`;
          btn.onmouseover = () => { btn.style.background='rgba(239,68,68,0.3)'; btn.style.borderColor='rgba(239,68,68,0.7)'; };
          btn.onmouseout  = () => { btn.style.background='rgba(239,68,68,0.15)'; btn.style.borderColor='rgba(239,68,68,0.4)'; };
          btn.onclick = () => openModal(t.modal);
          bar.appendChild(btn);
        });
        return bar;
      }

      // أضف زر الصوت في الشاشة الرئيسية (بجانب زر الفيديو)
      function injectTTSHomeButton() {
        // ابحث عن الأزرار الرئيسية (الصورة والفيديو)
        const buttons = document.querySelectorAll('#root button.group.relative.overflow-hidden.rounded-3xl');
        if (buttons.length >= 2 && !document.getElementById('home-tts-btn')) {
          const videoBtn = buttons[1];
          const container = videoBtn.parentElement;
          if (!container) return;

          const ttsBtn = document.createElement('button');
          ttsBtn.id = 'home-tts-btn';
          ttsBtn.className = videoBtn.className;
          ttsBtn.innerHTML = `
            <div class="absolute inset-0 gradient-primary opacity-0 group-hover:opacity-20 transition-opacity"></div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="w-24 h-24 rounded-full bg-red-500/20 flex items-center justify-center mb-6 group-hover:bg-red-500/30 transition-colors">
                <svg class="w-12 h-12 text-red-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                  <line x1="12" y1="19" x2="12" y2="23"/>
                  <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
              </div>
              <h3 class="text-2xl font-bold text-white mb-2">تحويل نص → صوت</h3>
              <p class="text-gray-400 text-center">حوّل أي نص إلى صوت وحمّله</p>
            </div>
          `;
          ttsBtn.onclick = () => openModal('tts-modal');
          // أضف الزر بعد زر الفيديو
          container.appendChild(ttsBtn);
          // غيّر الـ grid من 2 عمود إلى 3
          container.style.gridTemplateColumns = 'repeat(3, minmax(0, 1fr))';
        }
      }

      // أضف شريط الأزرار داخل قسم الفيديو
      function injectVideoToolsBar() {
        if (document.getElementById('video-tools-bar')) return; // مضافة مسبقاً
        // ابحث عن عنصر الفيديو
        const videoEl = document.querySelector('#root video');
        if (!videoEl) return;
        const videoWrapper = videoEl.closest('.relative.w-full.max-w-4xl');
        if (!videoWrapper) return;
        const parent = videoWrapper.parentElement;
        if (!parent) return;
        // أضف الشريط قبل منطقة عرض الفيديو
        const bar = makeVideoToolsBar();
        parent.insertBefore(bar, videoWrapper);
      }

      // MutationObserver لمراقبة التغييرات في DOM
      let lastMode = null;
      const observer = new MutationObserver(() => {
        const hasVideo = !!document.querySelector('#root video');
        const hasHomeButtons = document.querySelectorAll('#root button.group.relative.overflow-hidden.rounded-3xl').length >= 2;

        if (hasVideo && lastMode !== 'video') {
          lastMode = 'video';
          setTimeout(injectVideoToolsBar, 300);
        } else if (!hasVideo && hasHomeButtons && lastMode !== 'home') {
          lastMode = 'home';
          setTimeout(injectTTSHomeButton, 300);
        } else if (!hasVideo && !hasHomeButtons) {
          lastMode = null;
        }
      });

      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
